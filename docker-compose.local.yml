services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: polyphony
      POSTGRES_USER: polyphony
      POSTGRES_PASSWORD: polyphony
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U polyphony -d polyphony"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend-api:
    image: polyphony-backend-api:local
    build:
      context: .
      dockerfile: crates/backend-api/Dockerfile
      args:
        BUILD_PROFILE: debug
      cache_from:
        - type=local,src=.docker-cache/backend-api
      cache_to:
        - type=local,dest=.docker-cache/backend-api,mode=max
    environment:
      BACKEND_API_BIND: 0.0.0.0:5067
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DATABASE: polyphony
      POSTGRES_USERNAME: polyphony
      POSTGRES_PASSWORD: polyphony
      LIVEKIT_URL: ws://127.0.0.1:7880
      LIVEKIT_API_KEY: devkey
      LIVEKIT_API_SECRET: secret
      BACKEND_API_HTTP_REQUEST_LOGGING_LEVEL: ${BACKEND_API_HTTP_REQUEST_LOGGING_LEVEL:-info}
    ports:
      - "5067:5067"
    develop: 
      watch:
        - action: rebuild
          path:   ./crates/
    depends_on:
      postgres:
        condition: service_healthy
      livekit:
        condition: service_started

  livekit:
    image: livekit/livekit-server:latest
    command: ["--config", "/etc/livekit.yaml"]
    volumes:
      - ./livekit.local.yaml:/etc/livekit.yaml:ro
    ports:
      - "7880:7880/tcp"
      - "7881:7881/tcp"
      - "50000-50100:50000-50100/udp"

volumes:
  postgres_data:
