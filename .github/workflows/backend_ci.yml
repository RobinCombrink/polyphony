name: Backend CI

on:
  push:
    paths:
      - .github/workflows/backend_ci.yml
      - Cargo.toml
      - Cargo.lock
      - crates/**
    branches: [ main ]
  pull_request:
    paths:
      - .github/workflows/backend_ci.yml
      - Cargo.toml
      - Cargo.lock
      - crates/**
  workflow_dispatch:

concurrency:
  group: ci-rust-backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust-format:
    name: Rust format check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

  rust-lint:
    name: Rust lint
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Lint
        run: cargo clippy --workspace --all-targets -- -D warnings
  rust-tests:
    name: Rust unit and in memory acceptance tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Unit and acceptance tests
        run: cargo test --workspace --all-targets

  rust-postgres-bdd:
    name: Rust Postgres-backed cucumber tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Postgres-backed cucumber acceptance tests
        env:
          BDD_STORE: postgres
        run: cargo test -p backend-api --tests

  rust-package:
    name: Rust package and image artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - rust-format
      - rust-lint
      - rust-tests
      - rust-postgres-bdd
    outputs:
      image_tags: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Prepare dist directory
        run: mkdir -p dist

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image artifact
        uses: docker/build-push-action@v6
        with:
          context: .
          file: crates/backend-api/Dockerfile
          build-args: |
            BUILD_PROFILE=release
          tags: polyphony/backend-api:ci-${{ github.run_id }}-${{ github.run_attempt }}
          load: true
          cache-from: type=gha,scope=backend-api-image
          cache-to: type=gha,scope=backend-api-image,mode=max

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/backend-api
          tags: |
            type=sha
            type=ref,event=branch
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Tag image for release
        run: |
          source_image="polyphony/backend-api:ci-${{ github.run_id }}-${{ github.run_attempt }}"
          while IFS= read -r tag; do
            [ -n "$tag" ] || continue
            docker tag "$source_image" "$tag"
          done <<< "${{ steps.meta.outputs.tags }}"

      - name: Save backend image artifact
        run: |
          docker save \
            --output dist/backend-api-image.tar \
            polyphony/backend-api:ci-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Package backend build
        run: |
          mkdir -p dist
          cp target/release/backend-api dist/
          tar -czf "dist/polyphony-backend-${{ github.run_id }}-${{ github.run_attempt }}.tar.gz" -C dist backend-api

      - name: Upload backend build artifact
        uses: actions/upload-artifact@v4
        with:
          name: rust-backend-build-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            dist/polyphony-backend-${{ github.run_id }}-${{ github.run_attempt }}.tar.gz
            dist/backend-api-image.tar

  release:
    name: Publish to GitHub container registry and create GitHub release
    runs-on: ubuntu-latest
    needs:
      - rust-package
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
      packages: write
    steps:
      - name: Download backend build artifact
        uses: actions/download-artifact@v4
        with:
          name: rust-backend-build-${{ github.run_id }}-${{ github.run_attempt }}
          path: release-assets

      - name: Generate release metadata
        id: release_meta
        run: |
          echo "tag=backend-0.0.${GITHUB_RUN_ID}" >> "$GITHUB_OUTPUT"
      - name: Load prebuilt backend image
        run: docker load --input release-assets/backend-api-image.tar

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push prebuilt image tags
        run: |
          source_image="polyphony/backend-api:ci-${{ github.run_id }}-${{ github.run_attempt }}"
          while IFS= read -r tag; do
            [ -n "$tag" ] || continue
            docker tag "$source_image" "$tag"
            docker push "$tag"
          done <<< "${{ needs.rust-package.outputs.image_tags }}"
      - name: Publish release
        uses: actions/github-script@v7
        env:
          RELEASE_TAG: ${{ steps.release_meta.outputs.tag }}
          RELEASE_NAME: Backend ${{ steps.release_meta.outputs.tag }}
          ASSET_PATH: release-assets/polyphony-backend-${{ github.run_id }}-${{ github.run_attempt }}.tar.gz
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const tag = process.env.RELEASE_TAG;
            const name = process.env.RELEASE_NAME;
            const assetPath = process.env.ASSET_PATH;

            if (!fs.existsSync(assetPath)) {
              core.setFailed(`Release asset not found: ${assetPath}`);
              return;
            }

            const release = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name,
              generate_release_notes: true
            });

            const assetData = fs.readFileSync(assetPath);

            await github.rest.repos.uploadReleaseAsset({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.data.id,
              name: path.basename(assetPath),
              data: assetData,
              headers: {
                'content-type': 'application/gzip',
                'content-length': assetData.length
              }
            });
