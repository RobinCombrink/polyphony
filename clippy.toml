# Enforces canon rule (claude/stacks/rust.md): no-matches!-in-production.
# Exempt tests via crate-root `#![cfg_attr(test, allow(clippy::disallowed_macros))]`
# (unit tests) or `#![allow(clippy::disallowed_macros)]` at the top of integration-test
# files — module/fn-scoped allows silently no-op for this lint.
disallowed-macros = [
    { path = "core::matches", reason = "matches! is disallowed in production code — use an explicit pattern match (if let / match) instead. Exempt tests via crate-root #![cfg_attr(test, allow(clippy::disallowed_macros))]." },
]
