services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: polyphony
      POSTGRES_USER: polyphony
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U polyphony -d polyphony"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend-api:
    build:
      context: .
      dockerfile: crates/backend-api/Dockerfile
    environment:
      BACKEND_API_BIND: 0.0.0.0:5067
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DATABASE: polyphony
      POSTGRES_USERNAME: polyphony
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      LIVEKIT_URL: ${LIVEKIT_URL:?LIVEKIT_URL is required}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:?LIVEKIT_API_KEY is required}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:?LIVEKIT_API_SECRET is required}
    ports:
      - "5067:5067"
    depends_on:
      postgres:
        condition: service_healthy
      livekit:
        condition: service_started

  livekit:
    image: livekit/livekit-server:latest
    command:
      [
        "--config",
        "/etc/livekit.yaml",
        "--keys",
        "${LIVEKIT_API_KEY:?LIVEKIT_API_KEY is required}: ${LIVEKIT_API_SECRET:?LIVEKIT_API_SECRET is required}",
      ]
    volumes:
      - ./livekit.prod.yaml:/etc/livekit.yaml:ro
    ports:
      - "7880:7880/tcp"
      - "7881:7881/tcp"
      - "50000-50100:50000-50100/udp"

volumes:
  postgres_data:
