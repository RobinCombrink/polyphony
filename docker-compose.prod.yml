services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DATABASE:?POSTGRES_DATABASE is required}
      POSTGRES_USER: ${POSTGRES_USERNAME:?POSTGRES_USERNAME is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USERNAME} -d ${POSTGRES_DATABASE}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend-api:
    image: ${BACKEND_API_IMAGE:?BACKEND_API_IMAGE is required}
    restart: unless-stopped
    environment:
      BACKEND_API_RUNTIME_ENV: ${BACKEND_API_RUNTIME_ENV:-production}
      BACKEND_API_BIND: ${BACKEND_API_BIND:?BACKEND_API_BIND is required}
      BACKEND_API_CORS_ALLOWED_ORIGINS: ${BACKEND_API_CORS_ALLOWED_ORIGINS:?BACKEND_API_CORS_ALLOWED_ORIGINS is required}
      SENTRY_BACKEND_DSN: ${SENTRY_BACKEND_DSN:?SENTRY_BACKEND_DSN is required}
      AUTH0_ISSUER: ${AUTH0_ISSUER:?AUTH0_ISSUER is required}
      AUTH0_AUDIENCE: ${AUTH0_AUDIENCE:?AUTH0_AUDIENCE is required}
      POSTGRES_HOST: ${POSTGRES_HOST:?POSTGRES_HOST is required}
      POSTGRES_PORT: ${POSTGRES_PORT:?POSTGRES_PORT is required}
      POSTGRES_DATABASE: ${POSTGRES_DATABASE:?POSTGRES_DATABASE is required}
      POSTGRES_USERNAME: ${POSTGRES_USERNAME:?POSTGRES_USERNAME is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      LIVEKIT_URL: ${LIVEKIT_URL:?LIVEKIT_URL is required}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:?LIVEKIT_API_KEY is required}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:?LIVEKIT_API_SECRET is required}
    ports:
      - "5067:5067"
    depends_on:
      postgres:
        condition: service_healthy
      livekit:
        condition: service_started

  livekit:
    image: livekit/livekit-server:latest
    restart: unless-stopped
    command:
      [
        "--config",
        "/etc/livekit.yaml",
        "--keys",
        "${LIVEKIT_API_KEY:?LIVEKIT_API_KEY is required}: ${LIVEKIT_API_SECRET:?LIVEKIT_API_SECRET is required}",
      ]
    volumes:
      - ./livekit.prod.yaml:/etc/livekit.yaml:ro
    ports:
      - "7880:7880/tcp"
      - "7881:7881/tcp"
      - "50000-50100:50000-50100/udp"

volumes:
  postgres_data:
