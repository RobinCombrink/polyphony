# Per-repo lefthook config. Pulls the shared commit-msg + stack stop-gate jobs from
# dotfiles via `remotes:`; defining `stop-gate` jobs is this repo's opt-in to the
# user-global Claude Code stop-gate wrapper (dotfiles docs/adr/0001-hook-enforcement-stack.md).
# Green-baseline verified 2026-07-13: clippy -D warnings, cargo test, dart analyze, and
# flutter test all pass. The existing .githooks/pre-push stays and is unchanged.
remotes:
  - git_url: https://github.com/RobinCombrink/dotfiles
    ref: main
    configs:
      - lefthook/commit-msg.yml
      - lefthook/rust.yml
      - lefthook/flutter.yml

# Postgres BDD suite, scoped to storage-layer changes in the current dirty set (the
# per-turn analogue of the pre-push hook, which runs it on any Rust change per push).
stop-gate:
  jobs:
    - name: polyphony-postgres-bdd
      files: git diff --name-only HEAD && git ls-files --others --exclude-standard
      glob: "crates/backend-storage/**"
      env:
        BDD_STORE: postgres
      run: cargo test -p backend-api --tests
